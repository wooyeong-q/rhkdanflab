name: Apply mobile drag fix

on:
  push:
    paths:
      - 'scripts/patch-mobile-drag.js'
      - '.github/workflows/apply-mobile-drag-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-mobile-drag.js
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m '모바일 광물 이동 범위와 조흔 경로 확대'
          git push
