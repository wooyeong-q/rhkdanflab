name: Apply all-device mineral movement fix

on:
  push:
    paths:
      - '.github/workflows/mobile-responsive-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-all-device-movement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Expand mineral movement on PC tablet and mobile
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = 'ALL_DEVICE_DRAG_RANGE_V4'

          if marker in text:
              print('All-device drag range already applied.')
              raise SystemExit(0)

          current_bounds = "const isMobile=window.matchMedia('(max-width:760px)').matches;const sideKeep=isMobile?sm.width*.05:sm.width*.35;const verticalOverflow=isMobile?sm.height*.28:sm.height*.12;left=clamp(left,sideKeep,sr.width-sideKeep);top=clamp(top,-oy-verticalOverflow,sr.height-sm.height-oy+verticalOverflow);"
          original_bounds = "left=clamp(left,sm.width/2,sr.width-sm.width/2);top=clamp(top,-oy,sr.height-sm.height-oy);"
          all_device_bounds = "const sideKeep=sm.width*.05;const verticalOverflow=sm.height*.28;left=clamp(left,sideKeep,sr.width-sideKeep);top=clamp(top,-oy-verticalOverflow,sr.height-sm.height-oy+verticalOverflow);"

          if current_bounds in text:
              text = text.replace(current_bounds, all_device_bounds, 1)
          elif original_bounds in text:
              text = text.replace(original_bounds, all_device_bounds, 1)
          else:
              raise SystemExit('Movement boundary code not found.')

          text = text.replace('</body>', '<!-- ALL_DEVICE_DRAG_RANGE_V4 -->\n</body>', 1)
          path.write_text(text, encoding='utf-8')
          print('Applied PC, tablet, and mobile movement-range fix.')
          PY

      - name: Commit fixed index
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'PC 태블릿 모바일 광물 이동 범위 통일'
          git push